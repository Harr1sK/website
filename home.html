<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Name Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 20px;
            background-color: #f8f8f8;
        }
        .logo {
            height: 50px;
        }
        .brand-name {
            flex-grow: 1;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .menu {
            display: flex;
            justify-content: center;
            width: 100%;
            background-color: #333;
            overflow: hidden;
        }
        .menu a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .menu a:hover {
            background-color: #ddd;
            color: black;
        }
        .content {
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .genre {
            margin-bottom: 20px;
        }
        .genre h2 {
            margin-top: 0;
        }
        .input-section {
            margin-top: 40px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            max-width: 600px;
        }
        .input-section input {
            width: calc(50% - 20px);
            padding: 10px;
            margin: 5px 10px;
            box-sizing: border-box;
        }
    </style>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="header">
        <img src="hk.jpeg" id="hk" alt="Logo" class="logo">
        <div class="brand-name">H.K Incorporated</div>
    </div>
    <div class="menu">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </div>
    <div class="content">
        <div class="genre">
            <h2>Beauty Products</h2>
            <p>Shamboo</p>
        </div>
        <div class="genre">
            <h2>food</h2>
            <p>List of items for genre 2...</p>
        </div>
        <div class="genre">
            <h2>accessories</h2>
            <p>List of items for genre 3...</p>
        </div>
        <div class="genre">
            <h2>Genre 4</h2>
            <p>List of items for genre 4...</p>
        </div>
    </div>
    <div class="input-section">
        <h2>Contact Us</h2>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
    </div>

</body>
</html>
